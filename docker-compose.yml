version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: offerte_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: offerte
      POSTGRES_PASSWORD: offerte_secret
      POSTGRES_DB: offerte_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offerte -d offerte_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: offerte_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://offerte:offerte_secret@db:5432/offerte_db
      NEXTAUTH_SECRET: change_me_in_production
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: offerte_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
